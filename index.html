<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalt Kartarkiv</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Filter-menyn */
        #filter-container {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-left: 5px solid #ff6600;
        }

        #year-filter {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .admin-coord-display {
            position: absolute;
            bottom: 25px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            z-index: 1000;
            border: 2px solid #ff6600;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Popup styling */
        .ol-popup h3 { margin: 0 0 5px 0; color: #333; }
        .ol-popup p { margin: 5px 0; font-size: 13px; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .btn {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-pdf { background-color: #e74c3c; }
        .btn-winsplits { background-color: #3498db; }
        .btn-livelox { background-color: #2ecc71; }

        /* Orienteringsskärm-ikonen */
        .ol-icon-inner {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #ffffff 50%, #ff6600 50%);
            border: 1.5px solid #333;
            transform: rotate(45deg);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="filter-container">
        <strong>Välj år:</strong><br>
        <select id="year-filter" onchange="filterMarkers()">
            <option value="all">Alla kartor</option>
        </select>
    </div>

    <div id="map"></div>
    
    <div class="admin-coord-display" id="coords">
        Klicka på kartan för koordinater till kalkylarket
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Din länk till Google Sheets CSV
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDjd0ZeXpPuXF5guwyrqy8o8QXOZVQK8tnY1juG0qeDc5sr8_l8HvAy0S2ybISA_-CW7IerhEYA7Oa/pub?output=csv';

        const map = L.map('map').setView([62.0, 15.0], 5);
        let allMarkers = [];

        // Bakgrundskarta (CartoDB Positron - fungerar utan 403-fel lokalt)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Skapa ikonen
        const olIcon = L.divIcon({
            className: 'ol-icon',
            html: `<div class="ol-icon-inner"></div>`,
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });

        // Funktion för att ladda och bearbeta data
        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // Dela upp i rader och ta bort tomma rader
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
                
                const yearFilterMenu = document.getElementById('year-filter');
                const yearsFound = new Set();

                rows.forEach(row => {
                    // Hanterar både kommatecken och semikolon som avgränsare
                    const delimiter = row.includes(';') ? ';' : ',';
                    const cols = row.split(delimiter).map(c => c.trim().replace(/^"|"$/g, ''));

                    if (cols.length < 6) return;

                    const item = {
                        namn: cols[0],
                        ar: cols[1],
                        arrangor: cols[2],
                        langd: cols[3],
                        lat: parseFloat(cols[4].replace(',', '.')), // Fixar svenska decimaltecken
                        lng: parseFloat(cols[5].replace(',', '.')),
                        referat: cols[6] || "Inget referat skrivet.",
                        pdf: cols[7] || "#",
                        winsplits: cols[8] || "#",
                        livelox: cols[9] || "#"
                    };

                    if (!isNaN(item.lat) && !isNaN(item.lng)) {
                        const marker = L.marker([item.lat, item.lng], { icon: olIcon });
                        
                        const popupContent = `
                            <div class="ol-popup">
                                <h3>${item.namn}</h3>
                                <p><strong>År:</strong> ${item.ar} | <strong>Längd:</strong> ${item.langd}m</p>
                                <p><strong>Arrangör:</strong> ${item.arrangor}</p>
                                <div style="max-height:150px; overflow-y:auto; background:#f9f9f9; padding:8px; border:1px solid #eee; font-size:13px; line-height:1.4; margin:10px 0;">
                                    ${item.referat.replace(/\n/g, '<br>')}
                                </div>
                                <div class="btn-group">
                                    <a href="${item.pdf}" target="_blank" class="btn btn-pdf">Karta (PDF)</a>
                                    <a href="${item.winsplits}" target="_blank" class="btn btn-winsplits">Winsplits</a>
                                    <a href="${item.livelox}" target="_blank" class="btn btn-livelox">Livelox</a>
                                </div>
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent, { maxWidth: 300 });
                        marker.year = item.ar;
                        allMarkers.push(marker);
                        marker.addTo(map);
                        
                        if(item.ar) yearsFound.add(item.ar);
                    }
                });

                // Uppdatera år-filtret
                Array.from(yearsFound).sort((a, b) => b - a).forEach(year => {
                    const opt = document.createElement('option');
                    opt.value = year;
                    opt.innerHTML = year;
                    yearFilterMenu.appendChild(opt);
                });

            } catch (error) {
                console.error("Kunde inte ladda data:", error);
            }
        }

        // Filter-funktion
        function filterMarkers() {
            const selectedYear = document.getElementById('year-filter').value;
            allMarkers.forEach(marker => {
                if (selectedYear === "all" || marker.year === selectedYear) {
                    map.addLayer(marker);
                } else {
                    map.removeLayer(marker);
                }
            });
        }

        // Klick-funktion för admin (koordinater)
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(6);
            const lng = e.latlng.lng.toFixed(6);
            document.getElementById('coords').innerHTML = 
                `<strong>Kopiera till kalkylark:</strong><br>Lat: ${lat}<br>Long: ${lng}`;
        });

        loadData();
    </script>
</body>
</html>
