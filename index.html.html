<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalt Kartarkiv</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Filter-menyn */
        #filter-container {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-left: 5px solid #ff6600;
        }

        #year-filter { width: 100%; padding: 5px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }

        /* Koordinatvisning för admin */
        .admin-coord-display {
            position: absolute; bottom: 25px; left: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 12px; z-index: 1000;
            border: 2px solid #ff6600; border-radius: 8px; font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Popup styling */
        .ol-popup { min-width: 280px; }
        .ol-popup h3 { margin: 0 0 2px 0; color: #333; font-size: 18px; }
        .ol-popup p.meta { margin: 0 0 12px 0; font-size: 12px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .btn {
            display: block; text-align: center; padding: 10px;
            border-radius: 4px; text-decoration: none; color: white;
            font-weight: bold; font-size: 13px; transition: background 0.2s;
        }
        .btn-pdf { background-color: #e74c3c; }
        .btn-winsplits { background-color: #3498db; }
        .btn-livelox { background-color: #2ecc71; }
        .btn:hover { filter: brightness(90%); }

        .referat-box {
            max-height: 200px; overflow-y: auto; background: #fdf6f2;
            padding: 12px; border: 1px solid #f0e0d5; border-radius: 4px;
            font-size: 13px; line-height: 1.5; color: #444; white-space: pre-wrap;
        }

        /* KVADRATISK ORIENTERINGSSKÄRM */
        .ol-icon-inner {
            width: 20px; height: 20px;
            background: linear-gradient(135deg, #ffffff 50%, #ff6600 50%);
            border: 1.5px solid #333; box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Anpassning av kluster-cirklar */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(255, 102, 0, 0.6);
        }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(255, 102, 0, 0.8);
            color: white; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="filter-container">
        <strong>Välj år:</strong><br>
        <select id="year-filter" onchange="filterMarkers()">
            <option value="all">Alla kartor</option>
        </select>
    </div>

    <div id="map"></div>
    
    <div class="admin-coord-display" id="coords">
        Klicka på kartan för koordinater
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRDjd0ZeXpPuXF5guwyrqy8o8QXOZVQK8tnY1juG0qeDc5sr8_l8HvAy0S2ybISA_-CW7IerhEYA7Oa/pub?output=csv';

        const map = L.map('map').setView([62.0, 15.0], 5);
        
        // Skapa klustergruppen
        const markersGroup = L.markerClusterGroup({
            showCoverageOnHover: false,
            spiderfyOnMaxZoom: true,
            disableClusteringAtZoom: 17
        });

        // Bakgrundskarta
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        const olIcon = L.divIcon({
            className: 'ol-icon',
            html: `<div class="ol-icon-inner"></div>`,
            iconSize: [20, 20], iconAnchor: [10, 10]
        });

        let allMarkersList = [];

        async function loadData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const yearFilterMenu = document.getElementById('year-filter');
                    const yearsFound = new Set();

                    results.data.forEach(row => {
                        const item = {
                            namn: row["Namn"],
                            ar: row["År"],
                            arrangor: row["Arrangör"],
                            langd: row["Längd_m"],
                            tid: row["Tid"] || "", // Hämtar värdet från kolumnen Tid
                            lat: parseFloat(String(row["Latitud"]).replace(',', '.')),
                            lng: parseFloat(String(row["Longitud"]).replace(',', '.')),
                            referat: row["Referat"] || "Inget referat skrivet.",
                            pdf: row["PDF_URL"] || "#",
                            winsplits: row["Splits_URL"] || "#",
                            livelox: row["Route_URL"] || "#"
                        };

                        if (!isNaN(item.lat) && !isNaN(item.lng)) {
                            const marker = L.marker([item.lat, item.lng], { icon: olIcon });
                            
                            const popupContent = `
                                <div class="ol-popup">
                                    <h3>${item.namn}</h3>
                                    <p class="meta">
                                        <strong>${item.ar}</strong> | ${item.arrangor} | ${item.langd}m ${item.tid ? '| ' + item.tid : ''}
                                    </p>
                                    <div class="btn-group">
                                        <a href="${item.pdf}" target="_blank" class="btn btn-pdf">Karta (PDF)</a>
                                        <a href="${item.winsplits}" target="_blank" class="btn btn-winsplits">Split Times</a>
                                        <a href="${item.livelox}" target="_blank" class="btn btn-livelox">Route</a>
                                    </div>
                                    <div class="referat-box">${item.referat}</div>
                                </div>
                            `;
                            
                            marker.bindPopup(popupContent, { maxWidth: 350 });
                            marker.year = String(item.ar);
                            
                            allMarkersList.push(marker);
                            markersGroup.addLayer(marker);
                            if(item.ar) yearsFound.add(item.ar);
                        }
                    });

                    map.addLayer(markersGroup);

                    Array.from(yearsFound).sort((a, b) => b - a).forEach(year => {
                        const opt = document.createElement('option');
                        opt.value = year; opt.innerHTML = year;
                        yearFilterMenu.appendChild(opt);
                    });
                }
            });
        }

        function filterMarkers() {
            const selectedYear = document.getElementById('year-filter').value;
            markersGroup.clearLayers();
            
            allMarkersList.forEach(marker => {
                if (selectedYear === "all" || marker.year === selectedYear) {
                    markersGroup.addLayer(marker);
                }
            });
        }

        map.on('click', function(e) {
            document.getElementById('coords').innerHTML = 
                `<strong>Admin-koordinater:</strong><br>Lat: ${e.latlng.lat.toFixed(6)}<br>Long: ${e.latlng.lng.toFixed(6)}`;
        });

        loadData();
    </script>
</body>
</html>
